<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jetson Status</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 50px;
    background: #f2f2f2;
}

#estado {
    font-size: 2em;
    margin-bottom: 20px;
}

p {
    font-size: 1.2em;
}

button {
    font-size: 1em;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>
<body>

<h1 id="estado">Verificando Jetson...</h1>

<p id="imagenes"></p>
<p id="ultima"></p>

<button onclick="abrirGaleria()">Abrir Galería</button>

<script>
const server = "https://inwrought-uninquisitorially-orpha.ngrok-free.dev"; // Cambia por tu URL de Ngrok

// Consultar status
fetch(server + "/status")
.then(res => res.text())
.then(text => {
    if(text === "OK"){
        document.getElementById("estado").innerText = "🟢 Jetson Online";
        // Si está online, consultar info de imágenes
        fetch(server + "/info")
        .then(res => res.json())
        .then(data => {
            document.getElementById("imagenes").innerText =
                "📷 Imágenes almacenadas: " + data.imagenes;
            document.getElementById("ultima").innerText =
                "🖼 Última imagen: " + data.ultima_imagen;
        })
        .catch(()=>{
            document.getElementById("imagenes").innerText = "";
            document.getElementById("ultima").innerText = "";
        });
    } else {
        document.getElementById("estado").innerText = "🔴 Jetson Offline";
        document.getElementById("imagenes").innerText = "";
        document.getElementById("ultima").innerText = "";
    }
})
.catch(()=>{
    document.getElementById("estado").innerText = "🔴 Jetson Offline";
    document.getElementById("imagenes").innerText = "";
    document.getElementById("ultima").innerText = "";
});

// Función para abrir la galería
function abrirGaleria(){
    window.location.href = server;
}
</script>

</body>
</html>
