<script>

const server = "https://inwrought-uninquisitorially-orpha.ngrok-free.dev";

let img = new Image();

img.onload = function(){

    document.body.innerHTML = `
    <h1>🟢 Servidor activo</h1>
    <p>Redirigiendo a la galería...</p>
    `;

    setTimeout(()=>{
        window.location.href = server;
    },2000);

};

img.onerror = function(){

    document.body.innerHTML = `
    <h1>🔴 Servidor offline</h1>
    <p>La Jetson no está conectada</p>
    `;

};

img.src = server + "/status";

</script>
