<body>

<h1 id="titulo">Verificando servidor...</h1>
<p id="mensaje">Espera un momento</p>

<script>

const server = "https://inwrought-uninquisitorially-orpha.ngrok-free.dev";

fetch(server + "/status")
.then(response => {

    if(response.ok){

        document.getElementById("titulo").innerText = "Servidor activo";
        document.getElementById("mensaje").innerText = "Redirigiendo...";

        setTimeout(()=>{
            window.location.href = server;
        },2000);

    }else{

        document.getElementById("titulo").innerText = "Servidor offline";
        document.getElementById("mensaje").innerText = "La Jetson no está conectada";

    }

})
.catch(()=>{

    document.getElementById("titulo").innerText = "Servidor offline";
    document.getElementById("mensaje").innerText = "No se pudo conectar";

});

</script>

</body>
